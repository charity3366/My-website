<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的作品集</title>

    <style>
        body {
            background: #0f172a;
            color: #fff;
            font-family: Arial;
            margin: 0;
        }

        h1 {
            text-align: center;
            padding: 30px;
            color: #38bdf8;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            width: 300px;
            padding: 20px;
            border-radius: 12px;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 20px #38bdf8;
        }

        .card h2 {
            color: #38bdf8;
        }

        .tag {
            display: inline-block;
            background: #38bdf8;
            color: #000;
            padding: 3px 8px;
            margin: 5px 5px 0 0;
            border-radius: 5px;
            font-size: 12px;
        }

        a {
            color: #38bdf8;
            text-decoration: none;
        }
    </style>
</head>

<body>

<h1>👑 子午七星 - 项目作品集</h1>

<div class="container">

    <div class="card">
        <h2>Nginx 本地服务器</h2>
        <p>搭建本地 Web 服务，实现网站访问</p>
        <div>
            <span class="tag">Linux</span>
            <span class="tag">Nginx</span>
        </div>
    </div>

    <div class="card">
        <h2>网站存活检测脚本</h2>
        <p>使用 Python 检测网站是否在线</p>
        <div>
            <span class="tag">Python</span>
            <span class="tag">安全</span>
        </div>
    </div>

    <div class="card">
        <h2>我的 GitHub</h2>
        <p>查看我的所有项目代码</p>
        <a href="https://github.com/你的用户名" target="_blank">点击访问</a>
    </div>

</div>

</body>
</html>
